# 回测系统配置文件
# 与生产 config/settings.yaml 解耦，回测专用参数在此设置
# override 节点中的参数会覆盖 settings.yaml 对应值，用于参数优化

backtest:
  # ── 回测时间区间 ──────────────────────────────
  start_date: "2026-01-01"
  end_date:   "2026-03-31"

  # ── 回测账户 ──────────────────────────────────
  initial_balance: 100.0     # 初始资金 (USDT)
  leverage: 10                  # 杠杆倍数（与生产一致）

    # ── 成本模型 ──────────────────────────────────
  fee_rate: 0.0005              # taker 手续费率 (OKX 合约 0.05%)
  slippage_pct: 0.001           # 滑点百分比 (0.1%，保守估计)

  # ── 信号触发频率 ──────────────────────────────
  # 每隔多少根最低周期 bar 触发一次信号检查
  # 例：最低周期=15m，signal_interval_bars=4 → 每1h检查一次（与生产一致）
  signal_interval_bars: 1

  # ── AI 替代模式 ───────────────────────────────
  # rule_only : 纯规则引擎构造伪AI决策（推荐，可重复执行，无API成本）
  # llm_mock  : 读取预缓存的LLM响应JSON（用于验证AI效果）
  # llm_real  : 调用生产环境真实文本LLM API（用于验证生产LLM逻辑，需API Key）
  ai_mode: "rule_only"

  # ── 下载时间框架 ───────────────────────────────
  # download 子命令默认下载的周期列表（可被 --timeframes 命令行参数覆盖）
  download_timeframes: ["5m", "15m", "30m", "1h"]

  # ── 数据缓存 ──────────────────────────────────
  data_cache_dir: "backtest/data/cache"

  # ── 报告输出 ──────────────────────────────────
  results_dir: "backtest/results"

  # ── 日志级别 ──────────────────────────────────
  log_level: "INFO"             # DEBUG / INFO / WARNING

override:
  # ── 放开做空限制（生产禁止，回测测试做空）───────────────────
  rule_filter:
    session_short_banned: []                # 移除所有时段禁止做空限制（欧洲+亚洲+美洲全部开放）
    rsi_neutral_short_ban_upper: 100        # 关闭 RSI 中性偏弱区禁止做空（原40-60）
    rsi_neutral_short_ban_lower: 0
    bearish_engulfing_short_ban: true       # 保持关闭（做空7连败0胜率亏损-176U）
    # ── R12 新增限制 ──────────────────────────────────────────
    adx_trending_threshold: 30              # ← R12：从20提高到30，减少ADX20-25伪信号（均亏损-0.91U/笔）
    rsi_overbought: 60                      # ← R12：从65降低到60，留5%安全边际（AVAX RSI=64.6快速止损）

  # ── 形态仓位配置 ─────────────────────────────────────────────
  trading:
    pattern_position_boost:
      none: 0.5                             # ← R12：无形态信号仓位降至50%（none形态4笔亏损-0.51U/笔）
