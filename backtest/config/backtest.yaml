# 回测系统配置文件
# 与生产 config/settings.yaml 解耦，回测专用参数在此设置
# override 节点中的参数会覆盖 settings.yaml 对应值，用于参数优化

backtest:
  # ── 回测时间区间 ──────────────────────────────
  start_date: "2026-03-15"
  end_date:   "2026-03-31"

  # ── 回测账户 ──────────────────────────────────
  initial_balance: 500.0     # 初始资金 (USDT)
  leverage: 10                  # 杠杆倍数（与生产一致）

  # ── 成本模型 ──────────────────────────────────
  fee_rate: 0.0005              # taker 手续费率 (OKX 合约 0.05%)
  slippage_pct: 0.001           # 滑点百分比 (0.1%，保守估计)

  # ── 信号触发频率 ──────────────────────────────
  # 每隔多少根最低周期 bar 触发一次信号检查
  # 例：最低周期=15m，signal_interval_bars=4 → 每1h检查一次（与生产一致）
  signal_interval_bars: 1

  # ── AI 替代模式 ───────────────────────────────
  # rule_only : 纯规则引擎构造伪AI决策（推荐，可重复执行，无API成本）
  # llm_mock  : 读取预缓存的LLM响应JSON（用于验证AI效果）
  # llm_real  : 调用生产环境真实文本LLM API（用于验证生产LLM逻辑，需API Key）
  ai_mode: "rule_only"

  # ── 下载时间框架 ───────────────────────────────
  # download 子命令默认下载的周期列表（可被 --timeframes 命令行参数覆盖）
  download_timeframes: ["5m", "15m", "30m", "1h"]

  # ── 数据缓存 ──────────────────────────────────
  data_cache_dir: "backtest/data/cache"

  # ── 报告输出 ──────────────────────────────────
  results_dir: "backtest/results"

  # ── 日志级别 ──────────────────────────────────
  log_level: "INFO"             # DEBUG / INFO / WARNING

# ── 参数覆盖（覆盖 settings.yaml 对应值，用于单次回测调参）──────────────
# 不填则使用 settings.yaml 中的值
override:
  rule_filter:
    adx_trending_threshold: 35         # ADX >= 此值视为趋势环境
    rsi_oversold: 35                   # P1：RSI超卖阈值从30提高到35
    rsi_oversold_strict: true          # P1：RSI超卖严格模式，禁止所有做空
    pattern_filter:                     # P0：形态过滤
      inside_bar_enabled: false         # 彻底关闭inside_bar（两月7/7全亏）
      inside_bar_require_trend: true    # 保留趋势背景检查

  # 回测仅覆盖美洲时段（完全替换生产配置，非合集）
  trading_sessions:
    enabled: true
    timezone: "UTC+8"
    sessions:
      - name: "americas"
        label: "美洲时段"
        start_hour: 22
        end_hour: 5

  trading:
    target_rr_ratio: 2.0               # 止盈设置：止盈距离 = 止损距离 × 2.0
    stop_loss_atr_multiplier: 1.5      # ATR 基础倍数

  # P0：CORE/DOT/RSR 黑名单（两月亏损-300U，系统性漏洞）
  # 已写入 config/symbols.yaml，此处无需重复配置
