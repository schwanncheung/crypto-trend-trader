# config/settings.yaml
# ⚠️ 所有 API Key 均从 .env 文件读取，此处不填写任何密钥

# ── 交易所配置 ───────────────────────────────────────────────────────
exchange:
  name: "okx"       # 交易所名称（仅支持 okx）
  testnet: false    # true=模拟盘  false=实盘（上线前务必先在模拟盘验证全流程）

# ── 全局时间框架 ─────────────────────────────────────────────────────
# 从高到低排列：最高周期作为方向锚，最低周期用于入场确认
# 修改此处后，规则引擎、K线获取、Prompt 均自动适配
timeframes: ["1h", "15m", "5m"]

# ── 分析配置 ─────────────────────────────────────────────────────────
analysis:
  # mode: "text"      = 规则引擎预过滤 + LLM 文本分析（推荐）
  # mode: "rule_only" = 纯规则引擎，不调用 LLM（适合测试/低成本运行）
  mode: "text"

  # 文本 LLM 配置（text 模式使用，兼容 OpenAI 接口）
  text_llm:
    primary_model: "kimi-k2.5"
    fallback_model: "glm-5"
    max_tokens: 2000
    timeout: 30
    base_url: "https://coding.dashscope.aliyuncs.com/v1"

  # LLM 熔断配置（API 故障自动降级到 rule_only）
  circuit_breaker:
    enabled: true
    failure_threshold: 3        # 连续失败多少次后熔断
    success_threshold: 1        # 半开状态下成功多少次后恢复正常
    recovery_window_sec: 300    # 熔断后多少秒进入半开状态（5 分钟）
    fallback_mode: "rule_only"  # 熔断后降级模式："rule_only" | "reject"

  # 指标计算参数
  indicator:
    ema_periods: [21, 55, 200]  # EMA 周期（短/中/长），用于趋势排列判断
    adx_period: 14              # ADX 计算周期
    rsi_period: 14              # RSI 计算周期
    volume_ma_period: 5         # 量比分母：成交量 MA 周期（量比 = 当前量 / MA5）
    swing_lookback: 5           # 波段高低点回看 K 线数（用于 HH/HL/LH/LL 结构判断）
    swing_count: 3              # 最少需要识别的波段高低点数量

    # 动量加速检测（优化1：区分趋势刚加速 vs 趋势已走完大半）
    momentum_accel_recent_bars: 3    # 近期窗口（根），比较最近N根实体均值
    momentum_accel_baseline_bars: 10 # 基准窗口（根），比较前M根实体均值
    momentum_accel_ratio: 1.5        # 近期/基准 > 此值视为加速

    # 量价同向验证（优化3：过滤量价背离的假趋势）
    vol_price_align_lookback: 3      # 取最近N根阳线/阴线计算平均量
    vol_price_align_threshold: 1.0   # 方向量/反向量 > 此值视为量价同向

    # 动量衰减检测（优化4：持仓期间检测出场信号）
    momentum_decay_lookback: 5       # 检测最近N根K线是否实体逐渐缩小（5m周期下5根=25分钟，避免误触发）
    momentum_decay_shadow_ratio: 1.0 # 影线/实体 > 此值视为反向压力显著

  # 规则引擎预过滤（进入 LLM 前的门卫，不通过直接返回 wait）
  rule_filter:

    # ═══════════════════════════════════════════════════════════════════
    # 一、基础趋势判断
    # ═══════════════════════════════════════════════════════════════════
    anchor_timeframe: "1h"              # 锚周期：宏观方向判断，必须非横盘才放行
    require_anchor_aligned: true        # 是否要求锚周期与信号方向对齐
    min_trending_timeframes: 2          # 非锚周期中至少几个显示趋势
    adx_trending_threshold: 20          # ADX >= 此值视为趋势，低于此值为横盘
    volume_ratio_threshold: 0.8         # 量比阈值：当前量 / MA5 >= 此值视为放量

    # ═══════════════════════════════════════════════════════════════════
    # 二、RSI 保护机制（多层，优先级从高到低）
    # ═══════════════════════════════════════════════════════════════════

    # 2.1 基础 RSI 极值过滤（可被 ADX 豁免）
    # 只检查锚周期 RSI，小周期波动大不检查
    rsi_overbought: 65                  # RSI 超买线（做多保护）
    rsi_oversold: 30                    # RSI 超卖线（做空保护）← 从 25 收紧到 30，防止暴跌后追空


    # 2.2 ADX 豁免基础 RSI 过滤（防止强趋势 RSI 钝化漏单）
    rsi_adx_exemption_enabled: false    # 禁用：防止强趋势时 RSI 超卖仍开仓导致超跌反弹
    rsi_adx_exemption_threshold: 40     # ADX >= 此值豁免基础 RSI 过滤

    # 2.3 极强趋势豁免（同时满足 ADX + DI 差值条件时，额外豁免量能/反弹/转折保护）
    # 不豁免：RSI 持续保护、RSI 背离保护
    strong_trend_adx_threshold: 60
    strong_trend_di_diff_threshold: 20  # +DI 与 -DI 差值 >= 此值视为方向明确

    # 2.4 RSI 持续保护（最高优先级，极强趋势也不豁免）
    # 防止在动能耗尽时追单
    rsi_oversold_persist_bars: 10       # 做空保护：RSI 连续 N 根 <= 超卖线后禁止做空
    rsi_oversold_persist_level: 20      # 超卖判定线（锚周期）

    # 2.5 RSI 背离保护（最高优先级，极强趋势也不豁免）
    # 价格新低但 RSI 未新低 = 底背离，动能衰竭，禁止做空
    rsi_divergence_enabled: true
    rsi_divergence_lookback: 10         # 背离检测的 K 线历史窗口（根）
    rsi_divergence_min_drop_pct: 0.005  # 价格新低幅度最低要求（0.5%），过滤噪音
    rsi_divergence_min_rsi_diff: 3.0    # RSI 未跟随价格的最小差值（点）

    # 2.6 RSI 反弹保护（可被极强趋势豁免）
    # RSI 从超卖区反弹超过阈值，判定"修复中"，禁止做空
    rsi_bounce_guard_delta: 15          # 反弹幅度阈值（点）
    rsi_bounce_guard_oversold: 15       # 超卖判定线（低于此值才触发反弹保护）

    # 2.7 RSI 转折预警（可被极强趋势豁免）
    # 小周期 RSI 连续回升 + 放量，可能转折，暂停做空
    rsi_reversal_warning_timeframes: ["5m", "15m"]
    rsi_reversal_consecutive_rounds: 2  # 连续 N 轮 RSI 同向运动触发预警
    rsi_reversal_vol_confirm: true      # 是否要求量能放大才触发预警

    # ═══════════════════════════════════════════════════════════════════
    # 三、多头信号质量（非硬过滤，仅记录质量供 LLM 参考）
    # ═══════════════════════════════════════════════════════════════════
    long_signal_rsi_low: 40             # RSI 低于此值视为充分回调，适合做多介入
    long_signal_vol_ratio: 1.0          # 做多量比最低要求

    # ═══════════════════════════════════════════════════════════════════
    # 四、近期趋势动能评估（解决 EMA200 惯性滞后，捕捉趋势刚启动）
    # ═══════════════════════════════════════════════════════════════════
    # EMA200 惯性极强，横盘后刚启动的趋势需 55+ 小时才能形成排列。
    # 解决：单独评估最近 N 根 K 线的方向连续性，作为趋势判断的补充评分项，
    # 并在 ADX 尚低但近期价格突破背景中位价时豁免 ADX 门槛。
    recent_trend_window: 24             # 近期窗口（根）：1h 周期下 24 根 = 近 24 小时
    recent_trend_min_pct: 0.7           # 方向一致 K 线占比下限（65%）
    recent_trend_min_move: 0.015        # 窗口内总振幅下限（1.5%），过滤横盘假信号
    context_trend_window: 90            # 背景窗口（根）：判断近期是否突破了横盘区间

# ── 交易执行配置 ─────────────────────────────────────────────────────
trading:
  enable_open_position: true    # 开仓总开关：false=禁止开仓（紧急关闭）
  default_leverage: 10          # 默认杠杆倍数

  # 信号质量门槛
  allowed_confidence: ["high"]  # 只有 confidence=high 的信号才允许交易
  min_signal_strength: 7        # 最低信号强度（1-10）← 从6提高到7，过滤弱信号
  min_trend_strength: 7         # 最低趋势强度（1-10）← 从6提高到7
  min_rr_ratio: 1.5             # 最低盈亏比 ← 从1.5提高到2.0，确保足够利润空间
  target_rr_ratio: 2.0          # 止盈设置：止盈距离 = 止损距离 × 此倍数 ← 从1.8提高到2.5

  # 形态仓位倍数（高胜率形态增加仓位）
  pattern_position_boost:
    bullish_engulfing: 1.2       # 看涨吞没：仓位增加20%
    hammer: 1.3                  # ‌锤子线：仓位增加30%
    morning_star: 1.1            # 启明星：仓位增加10%
    pin_bar_bull: 1.1            # 长下影线看涨：仓位增加10%
    # inside_bar: 1.1              # 孕线：仓位增加10%
    # 其他形态默认为 1.0（无加仓）

  # ADX 边缘区间加严（ADX 处于 20-25 时提高信号强度门槛）
  adx_edge_min: 25               # ← 从 20 提高到 25，边缘区间加严
  adx_edge_max: 25
  adx_edge_min_signal_strength: 8  # 边缘区间内要求的最低信号强度

  # 仓位控制
  max_position_pct: 0.15        # 单笔最大仓位占账户净值比例（15%）
  max_margin_usage_ratio: 0.5   # 保证金占可用余额的最大比例（50%）
  max_slippage_pct: 5.0         # 滑点超过此百分比时重新计算止损止盈

  # AI warning 仓位折减
  warning_position_ratio: 0.6   # 触发 warning 时仓位折减比例（0.6 = 标准仓位的 60%）
  warning_keywords: ["低市值", "高波动", "插针", "小市值", "波动大", "仓位减半", "极端缩量"]

  # 动态止损（止损距离 = ATR × 倍数，倍数随 ADX 动态调整）
  stop_loss_atr_multiplier: 2.0  # ATR 基础倍数 ← 从2.5收紧到2.0，减少止损距离
  stop_loss_adx_scaling:
    enabled: false
    strong_trend_threshold: 40   # ADX >= 此值视为强趋势
    strong_trend_multiplier: 1.2 # 强趋势止损倍数（40 <= ADX < 60）
    extreme_trend_threshold: 60  # ADX >= 此值视为极强趋势
    extreme_trend_multiplier: 1.5  # 极强趋势止损倍数（ADX >= 60）

  # ATR 跟踪止损（优化2：第一批止盈后剩余仓位用跟踪止损）
  trailing_stop_atr_multiplier: 1.5  # 跟踪止损 ATR 倍数（比开仓止损更紧）

  # 止损止盈硬性上限（风控红线）
  max_stop_loss_pct: 2.0           # 止损距离基准上限（%）
  max_stop_loss_multiplier: 1.0  # 止损距离允许放大倍数 ← 从2.5收紧到1.5（实际上限=1.5%×1.5=2.25%）
  max_take_profit_pct: 4.0       # 止盈距离上限（%）← 从5.0放宽到6.0，配合更高的R:R

# ── 账户风控 ─────────────────────────────────────────────────────────
risk:
  leverage: 10                   # 杠杆倍数（与 trading.default_leverage 保持一致）
  risk_per_trade_pct: 1.0        # 单笔最大风险占可用余额比例（%）
  max_open_positions: 5          # 最大同时持仓数
  max_loss_pct: -10.0             # 日亏损上限（%），超过后当日停止自动交易
  stop_loss_cooldown_hours: 4    # 止损后冷却时间（小时），防止短期内重复开仓同一合约
  take_profit_cooldown_minutes: 30  # 止盈后冷却时间（分钟），防止刚止盈又立即重新开仓

# ── 持仓管理 ─────────────────────────────────────────────────────────
trade_manager:
  # 移动止损：浮盈达到此百分比时，将止损移至保本位（入场价）
  trailing_stop_trigger_pct: 20.0

  # 分批止盈
  partial_profit_trigger_pct: 15.0    # 第一批触发阈值（%）
  partial_profit_ratio_1: 0.4         # 第一批平仓比例（40%）
  partial_profit_trigger_pct_2: 40.0  # 第二批触发阈值（%）
  partial_profit_ratio_2: 1.0         # 第二批平仓比例（100% = 全部平仓）

  # 强制平仓（三层止损机制的最后兜底）
  # 层1：交易所止损单（最快，动态止损 2%-3%）
  # 层2：结构平仓（每5分钟）：支撑/阻力突破、趋势破坏
  # 层3：强制平仓（每5分钟）：兜底保护，防止止损单失效
  force_close_loss_pct: -30.0         # 浮亏超过此百分比时强制平仓

  # 结构平仓参数
  structure_check_timeframe: "1h"     # 结构判断使用的时间框架
  support_buffer_pct: 0.3             # 支撑/阻力突破判定缓冲区（%）

  # 动量衰减出场（优化4：持仓期间检测动量衰减，主动出场）
  momentum_decay_exit_enabled: true   # 是否启用动量衰减出场
  momentum_decay_min_profit_pct: 5.0  # 触发动量衰减出场的最低浮盈要求（%）

# ── K 线拉取数量 ─────────────────────────────────────────────────────
# EMA(200) 计算需要至少 200 根数据，不建议低于 200
kline:
  limits:
    "5m":  300   # 300 根 ≈ 25 小时，覆盖近 1 天短线结构（满足 EMA200 计算需求）
    "15m": 300   # 300 根 ≈ 75 小时，覆盖近 3 天短线结构
    "1h":  200   # 200 根 ≈ 8 天，覆盖近 1 周中线结构

# ── 扫描器配置 ───────────────────────────────────────────────────────
scanner:
  top_n_symbols: 50           # 每轮扫描的热门合约数量（按 24h 成交量降序）
  min_volume_usdt: 80000000   # 最低 24h 成交量门槛（USDT），过滤流动性不足的合约
  max_price_usdt: 5.0        # 最高价格门槛（USDT），0 = 不限制
