# config/settings.yaml
# ⚠️ 所有 API Key 均从 .env 文件读取，此处不填写任何密钥

# ── 交易所配置 ───────────────────────────────────────────────────────
exchange:
  name: "okx"       # 交易所名称（仅支持 okx）
  testnet: true      # true=模拟盘  false=实盘（上线前务必先在模拟盘验证全流程）

# ── 全局时间框架（所有模块统一使用）────────────────────────────────────
# 从高到低排列：最高周期作为方向锚，最低周期用于入场确认
# 修改此处后，规则引擎、K线获取、图表生成、Prompt 均自动适配
timeframes: ["1h", "30m", "15m"]

# ── AI 视觉模型（visual模式用）────────────────────────────────────────
# 三级降级链：primary → secondary → fallback
ai:
  primary:
    provider: "qwen"          # 模型提供商（用于日志标记）
    model: "qwen3-vl-flash"   # 第一优先视觉模型（速度快）
    thinking_mode: false       # 是否启用 Thinking 模式（仅 qwen3 系列支持）
    max_tokens: 1500           # 最大输出 token 数
    timeout: 30                # API 超时秒数

  secondary:
    provider: "qwen"
    model: "qwen3-vl-plus"    # 第二优先视觉模型（精度更高）
    thinking_mode: true
    max_tokens: 2000
    timeout: 60

  fallback:
    provider: "qwen"
    model: "qwen-vl-max"      # 兜底视觉模型
    thinking_mode: false
    max_tokens: 1500
    timeout: 30

# ── 分析模式 ─────────────────────────────────────────────────────────
analysis:
  # mode: "text"      = 规则引擎预过滤 + LLM文本分析（推荐，省token，速度快）
  # mode: "visual"    = 生成K线图 → 视觉LLM分析（精度更高，消耗更多token）
  # mode: "rule_only" = 纯规则引擎，不调用任何LLM（速度最快，适合测试/低成本运行）
  mode: "text"

  # 文本LLM配置（text模式使用，兼容 OpenAI 接口）
  text_llm:
    primary_model: "kimi-k2.5"   # 主力文本模型
    fallback_model: "glm-5"     # 兜底文本模型
    max_tokens: 2000                 # 最大输出 token 数
    timeout: 30                      # API 超时秒数
    base_url: "https://coding.dashscope.aliyuncs.com/v1"  # 阿里云百炼 Coding Plan 接口

  # 规则引擎预过滤（进入LLM分析前必须通过，不通过直接返回 wait，节省 token）
  # ⚠️ 完整配置见下方 rule_filter 节（含v2新增的RSI保护和近期动能参数）

  # 指标计算参数
  indicator:
    ema_periods: [21, 55, 200]  # EMA周期列表（短/中/长），用于趋势排列判断
    adx_period: 14              # ADX 计算周期（标准值 14）
    rsi_period: 14              # RSI 计算周期（标准值 14）
    volume_ma_period: 5         # 成交量均线周期（量比 = 当前量 / MA5）
    swing_lookback: 5           # 波段高低点回看K线数（用于 HH/HL/LH/LL 结构判断）
    swing_count: 3              # 最少需要识别的波段高低点数量

  # ── 近期趋势动能评估（解决EMA200惯性滞后，捕捉趋势刚启动） ──────────
  # 背景：EMA200惯性极强，横盘后刚启动的趋势需55+小时才能形成空头/多头排列。
  # 解决方案：单独评估最近N根K线的方向连续性，作为趋势判断的第5个评分项，
  #           并在ADX尚低（趋势刚启动）但近期价格突破背景中位价时豁免ADX门槛。
  rule_filter:
    # ─── 已有配置 ───────────────────────────────────────────────────────
    anchor_timeframe: "1h"
    require_anchor_aligned: true
    min_trending_timeframes: 2
    adx_trending_threshold: 20
    volume_ratio_threshold: 0.8
    rsi_overbought: 80
    rsi_oversold: 20
    # RSI趋势转折预警参数
    rsi_reversal_warning_timeframes: ["15m", "30m"]  # 检测转折的小周期
    rsi_reversal_consecutive_rounds: 2               # 连续N轮RSI同向运动触发预警
    rsi_reversal_vol_confirm: true                   # 是否要求量能放大才触发预警
    # 超卖反弹保护参数
    rsi_bounce_guard_delta: 15       # RSI从低点反弹超过N点，判定"修复中"禁止做空（提升至15，减少误判）
    rsi_bounce_guard_oversold: 15    # 超卖判定线（从20降至15，缩小保护范围）
    # 趋势强度豁免参数（方案D：允许在极强趋势中跳过RSI超卖保护）
    strong_trend_adx_threshold: 60   # ADX超过此值视为极强趋势
    strong_trend_di_diff_threshold: 20  # DI差值超过此值视为方向明确
    # RSI底背离/顶背离保护（方案E：价格创新低但RSI未跟随→动能衰竭→禁止做空）
    rsi_divergence_enabled: true
    rsi_divergence_lookback: 10        # 用于背离检测的K线历史窗口（根）
    rsi_divergence_min_drop_pct: 0.005 # 价格新低幅度最低要求（0.5%），过滤噪音
    rsi_divergence_min_rsi_diff: 3.0   # RSI未跟随价格创新低的最小差值（pts）
    # RSI超卖持续保护：超卖连续N根K线后动能耗尽，即使极强趋势豁免也禁止做空
    rsi_oversold_persist_bars: 6       # 超卖持续根数门槛（锚周期，6根1h=连续6小时超卖）
    rsi_oversold_persist_level: 25     # 超卖判定线（RSI<=此值视为超卖）
    # 多头回调买点参数
    long_signal_rsi_low: 40          # RSI低于此值视为充分回调（适合做多介入）
    long_signal_vol_ratio: 1.0       # 做多量比最低要求
    # ─── 近期动能参数─
    # 场景：某合约横盘24小时后开始下跌，EMA排列仍是mixed（混乱），
    #       但近24根K线里16根是阴线且跌幅>1.5% → 判定近期动能=down → 空头得分+1
    # 近期窗口大小（根）：1h周期下24根=近24小时，覆盖"下跌4-8小时"到"下跌满1天"
    recent_trend_window: 24
    # 近期窗口内方向一致K线占比下限（24根里至少16根同向）
    recent_trend_min_pct: 0.65
    # 近期总价格变动幅度下限（1.5%），过滤横盘内假信号
    recent_trend_min_move: 0.015
    # 背景窗口（根）：用于计算"前期横盘中位价"，判断近期是否真正突破了横盘区间
    # 1h周期下60根=近60小时，覆盖你描述的"3月28日整天横盘"背景
    context_trend_window: 60

trading:
  allowed_confidence: ["high"]  # 只有 confidence=high 的信号才允许交易
  min_signal_strength: 6        # 最低信号强度（1-10），低于此值不交易
  min_trend_strength: 7         # 最低趋势强度（1-10），低于此值不交易（独立于信号强度）
  min_rr_ratio: 1.5             # 最低盈亏比（risk:reward），低于此值不交易
  default_leverage: 10          # 默认杠杆倍数
  max_position_pct: 0.1        # 单笔最大仓位占账户净值比例（10%）
  adx_edge_min: 20              # ADX边缘区间下限：低于此值为横盘
  adx_edge_max: 25              # ADX边缘区间上限：处于20-25边缘时提高信号强度门槛至8
  adx_edge_min_signal_strength: 8  # ADX边缘区间内要求的最低信号强度
  warning_position_ratio: 0.5   # AI返回 warning 时仓位折减比例（0.5=标准仓位的50%）
  # 触发仓位折减的 warning 关键词列表
  warning_keywords: ["低市值", "高波动", "插针", "流动性", "小市值", "波动大"]
  stop_loss_atr_multiplier: 2.5  # ATR动态止损倍数：止损 = entry ± atr×此倍数

# ── 账户风控 ────────────────────────────────────────────────────────
risk:
  max_open_positions: 5    # 最大同时持仓数，达到上限后停止开新仓
  max_loss_pct: -5.0       # 日亏损上限（%），超过后当日停止自动交易
  leverage: 10             # 风控模块使用的杠杆（与 trading.default_leverage 保持一致）
  min_risk_reward: 2.0     # 风控模块使用的最低盈亏比（与 trading.min_rr_ratio 保持一致）

# ── 持仓管理阈值 ─────────────────────────────────────────────────────
trade_manager:
  # 浮盈达到此百分比时，将止损移动至保本位（入场价），锁定不亏损
  trailing_stop_trigger_pct: 15.0
  # 第一批部分止盈触发阈值（%），达到时平掉 partial_profit_ratio_1 比例的仓位
  partial_profit_trigger_pct: 25.0
  # 第一批止盈平仓比例（0.3 = 平掉30%）
  partial_profit_ratio_1: 0.3
  # 第二批部分止盈触发阈值（%），达到时再平掉 partial_profit_ratio_2 比例的仓位
  partial_profit_trigger_pct_2: 50.0
  # 第二批止盈平仓比例（0.5 = 再平掉50%）
  partial_profit_ratio_2: 0.5
  # 浮亏超过此百分比时强制平仓（保证金维度，10倍杠杆下=-15%对应价格反向约1.5%）
  # 此为最后兜底，正常止损依赖交易所挂单的止损单，force_close 仅在止损单失效时触发
  force_close_loss_pct: -15.0
  # 结构判断使用的时间框架（用于支撑/阻力突破检测）
  structure_check_timeframe: "1h"
  # 支撑/阻力位突破判定的缓冲区（百分比，如 0.3 = 收盘价偏离0.3%内不算突破）
  support_buffer_pct: 0.3

# ── 图表配置 ────────────────────────────────────────────────────────
chart:
  save_dir: "logs/decisions"   # 图表和决策日志的保存目录
  # text模式下是否生成图表（true=生成PNG存档/false=跳过，节省时间和磁盘）
  # visual模式无论此配置如何，始终生成图表
  save_in_text_mode: false

# ── K线拉取数量（按周期单独配置）────────────────────────────────────────
# 注意：EMA(200) 计算需要至少200根数据才能保证精度，不建议低于200
kline:
  limits:
    "15m": 300   # 300根 ≈ 75小时，覆盖近3天短线结构
    "30m": 300   # 300根 ≈ 150小时，覆盖近6天结构
    "1h":  200   # 200根 ≈ 8天，覆盖近1周中线结构

# ── 扫描器配置 ──────────────────────────────────────────────────────
scanner:
  top_n_symbols: 50          # 每轮扫描的热门合约数量（按24h成交量降序取前N个）
  min_volume_usdt: 50000000  # 最低24h成交量门槛（USDT），过滤流动性不足的合约
  max_price_usdt: 10.0        # 最高价格门槛（USDT），过滤高价币，0 = 不限制

# ── 黑名单配置 ──────────────────────────────────────────────────────
# 扫描时自动跳过黑名单中的合约（格式："币种/USDT:USDT" 或简写 "币种"）
blacklist:
  - "SKY/USDT:USDT"
  - "LINEA/USDT:USDT"
